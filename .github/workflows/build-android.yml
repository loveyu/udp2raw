name: Build Android SO

on:
  push:
    branches: ["**"]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
            api: 21
          - abi: armeabi-v7a
            target: armv7a-linux-androideabi
            api: 21
          - abi: x86_64
            target: x86_64-linux-android
            api: 21
          - abi: x86
            target: i686-linux-android
            api: 21

    steps:
      - uses: actions/checkout@v4

      - name: Generate git version header
        run: echo "const char *gitversion = \"$(git rev-parse HEAD)\";" > git_version.h

      - name: Build libudp2raw.so for ${{ matrix.abi }}
        env:
          NDK: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          CXX="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}${{ matrix.api }}-clang++"
          echo "Using compiler: $CXX"
          $CXX --version

          SOURCES="main.cpp \
            lib/md5.cpp \
            lib/pbkdf2-sha1.cpp \
            lib/pbkdf2-sha256.cpp \
            encrypt.cpp \
            log.cpp \
            network.cpp \
            common.cpp \
            connection.cpp \
            misc.cpp \
            fd_manager.cpp \
            client.cpp \
            server.cpp \
            lib/aes_faster_c/aes.cpp \
            lib/aes_faster_c/wrapper.cpp \
            my_ev.cpp"

          FLAGS="-std=c++11 \
            -Wall -Wextra \
            -Wno-unused-variable \
            -Wno-unused-parameter \
            -Wno-missing-field-initializers \
            -O2 \
            -fPIE -pie \
            -isystem libev \
            -I."

          $CXX $SOURCES $FLAGS -o libudp2raw.so

          echo "Build succeeded, file info:"
          file libudp2raw.so
          ls -lh libudp2raw.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libudp2raw-${{ matrix.abi }}
          path: libudp2raw.so
          retention-days: 30

  collect:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all ABI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: libudp2raw-*
          merge-multiple: false

      - name: Show collected files
        run: |
          find . -name "libudp2raw.so" | sort | while read f; do
            echo "=== $f ==="
            ls -lh "$f"
            file "$f"
          done

      - name: Package all ABIs
        run: |
          mkdir -p jniLibs/arm64-v8a jniLibs/armeabi-v7a jniLibs/x86_64 jniLibs/x86
          cp libudp2raw-arm64-v8a/libudp2raw.so   jniLibs/arm64-v8a/libudp2raw.so
          cp libudp2raw-armeabi-v7a/libudp2raw.so jniLibs/armeabi-v7a/libudp2raw.so
          cp libudp2raw-x86_64/libudp2raw.so       jniLibs/x86_64/libudp2raw.so
          cp libudp2raw-x86/libudp2raw.so          jniLibs/x86/libudp2raw.so
          zip -r udp2raw-android-jniLibs.zip jniLibs/
          ls -lh udp2raw-android-jniLibs.zip

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: udp2raw-android-jniLibs
          path: udp2raw-android-jniLibs.zip
          retention-days: 30

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: udp2raw-android-jniLibs.zip
          generate_release_notes: true
